name: Deploy worker

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Actions environment (staging | production)
        type: string
        required: true
      app:
        description: Fly.io app name (e.g. pipewatch-staging-worker)
        type: string
        required: true
      sentry_release:
        description: Sentry release identifier (pipewatch@version+sha)
        type: string
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy worker (${{ inputs.app }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build worker
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/worker...

      - name: Create Sentry release and upload worker source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-worker
        run: >-
          bash .github/scripts/sentry-release.sh worker apps/worker/dist
          "${{ inputs.sentry_release }}" "${{ inputs.environment }}"

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy worker to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: ${{ inputs.app }}
        run: bash .github/scripts/deploy-fly.sh worker
