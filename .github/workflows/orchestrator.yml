name: Orchestrator

# Sole entry point — CI, deploy, release, and CE image builds (PRD §22, Decision #34–#35).
# Only this workflow calls reusable workflows under .github/workflows/.

on:
  push:
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: orchestrator-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    if: github.event_name != 'release'
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  version-check:
    name: Version check
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: ./.github/workflows/version-check.yml

  meta:
    name: Resolve commit metadata
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  provision-fly-staging:
    name: Provision Fly apps (staging)
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/staging'
    needs: [ci]
    permissions:
      contents: read
    uses: ./.github/workflows/provision-fly.yml
    with:
      environment: staging
    secrets: inherit

  provision-redis-staging:
    name: Provision Fly Redis (staging)
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/staging'
    needs: [provision-fly-staging]
    permissions:
      contents: read
    uses: ./.github/workflows/provision-redis.yml
    with:
      environment: staging
    secrets: inherit

  sync-secrets-staging:
    name: Sync secrets (staging)
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/staging'
    needs: [provision-redis-staging]
    permissions:
      contents: read
    uses: ./.github/workflows/sync-secrets.yml
    with:
      environment: staging
    secrets: inherit

  deploy-staging:
    name: Deploy staging
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/staging'
    needs: [sync-secrets-staging]
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-staging.yml
    secrets: inherit

  build-ce-staging:
    name: Build CE images (staging)
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/staging'
    needs: [deploy-staging, meta]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-ce-image.yml
    with:
      tags: |
        dev
        nightly
        ${{ needs.meta.outputs.short_sha }}
    secrets: inherit

  prepare-release:
    name: Prepare release
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    needs: [ci]
    permissions:
      contents: write
    uses: ./.github/workflows/prepare-release.yml
    secrets: inherit

  build-ce-main:
    name: Build CE images (main)
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    needs: [ci, meta]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-ce-image.yml
    with:
      tags: |
        latest
        ${{ needs.meta.outputs.short_sha }}
        main
    secrets: inherit

  provision-fly-production:
    name: Provision Fly apps (production)
    if: github.event_name == 'release'
    permissions:
      contents: read
    uses: ./.github/workflows/provision-fly.yml
    with:
      environment: production
    secrets: inherit

  provision-redis-production:
    name: Provision Fly Redis (production)
    if: github.event_name == 'release'
    needs: [provision-fly-production]
    permissions:
      contents: read
    uses: ./.github/workflows/provision-redis.yml
    with:
      environment: production
    secrets: inherit

  sync-secrets-production:
    name: Sync secrets (production)
    if: github.event_name == 'release'
    needs: [provision-redis-production]
    permissions:
      contents: read
    uses: ./.github/workflows/sync-secrets.yml
    with:
      environment: production
    secrets: inherit

  deploy-production:
    name: Deploy production
    if: github.event_name == 'release'
    needs: [sync-secrets-production]
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/deploy-production.yml
    with:
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  build-ce-release:
    name: Build CE images (release)
    if: >-
      needs.deploy-production.outputs.deployed == 'true' &&
      github.event_name == 'release'
    needs: [deploy-production]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-ce-image.yml
    with:
      tags: |
        latest
        ${{ github.event.release.tag_name }}
    secrets: inherit

  e2e:
    name: E2E
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'staging'
    needs: [ci]
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/e2e.yml
    with:
      advisory: false
    secrets: inherit
