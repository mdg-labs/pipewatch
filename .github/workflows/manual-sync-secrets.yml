name: Manual sync secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging, production]
        required: true
      services:
        description: Services to sync (comma-separated, or "all")
        type: string
        default: all

permissions:
  contents: read

jobs:
  sync:
    name: Sync secrets (${{ inputs.environment }})
    uses: ./.github/workflows/sync-secrets.yml
    with:
      environment: ${{ inputs.environment }}
      services: ${{ inputs.services }}
    secrets: inherit
