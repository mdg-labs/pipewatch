name: Deploy Staging

# Staging deploy pipeline — reusable workflow called from orchestrator.yml after CI passes (PRD §22).
# Job chain: sync-secrets → migrate → derive Sentry release → parallel deploys → smoke.

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  sync-secrets:
    name: Staging · 1 · Sync secrets
    permissions:
      contents: read
    uses: ./.github/workflows/sync-secrets.yml
    with:
      environment: staging
      services: all
    secrets: inherit

  migrate-staging:
    name: Staging · 2 · Run DB migrations
    runs-on: ubuntu-latest
    environment: staging
    needs: sync-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Run Drizzle migrations
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: bash .github/scripts/run-migrate.sh

  derive-sentry-release:
    name: Staging · 2b · Derive Sentry release
    runs-on: ubuntu-latest
    needs: migrate-staging
    outputs:
      release: ${{ steps.release.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive Sentry release
        id: release
        run: bash .github/scripts/derive-sentry-release.sh

  deploy-api:
    name: Staging · 3 · Deploy API
    needs: derive-sentry-release
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-api.yml
    with:
      environment: staging
      app: pipewatch-staging-api
      sentry_release: ${{ needs.derive-sentry-release.outputs.release }}
    secrets: inherit

  deploy-worker:
    name: Staging · 3 · Deploy worker
    needs: derive-sentry-release
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-worker.yml
    with:
      environment: staging
      app: pipewatch-staging-worker
      sentry_release: ${{ needs.derive-sentry-release.outputs.release }}
    secrets: inherit

  deploy-web:
    name: Staging · 3 · Deploy web
    needs: derive-sentry-release
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-web.yml
    with:
      environment: staging
      worker: pipewatch-staging-web
      sentry_release: ${{ needs.derive-sentry-release.outputs.release }}
    secrets: inherit

  deploy-marketing:
    name: Staging · 3 · Deploy marketing
    needs: derive-sentry-release
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-marketing.yml
    with:
      environment: staging
      worker: pipewatch-staging-marketing
      sentry_release: ${{ needs.derive-sentry-release.outputs.release }}
    secrets: inherit

  smoke-staging:
    name: Staging · 4 · Smoke
    runs-on: ubuntu-latest
    environment: staging
    needs: [deploy-api, deploy-worker, deploy-web, deploy-marketing]
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      APP_URL: ${{ secrets.APP_URL }}
      MARKETING_URL: ${{ secrets.MARKETING_URL }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Smoke deploy surfaces
        run: bash .github/scripts/smoke-staging-health.sh
