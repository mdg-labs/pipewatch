name: Deploy Staging

# Staging deploy pipeline — reusable workflow called from orchestrator.yml after CI passes (PRD §22).
# Job chain: migrate → derive Sentry release → parallel deploys → smoke.
# Secrets sync runs in orchestrator before this workflow (#132); flyctl deploy applies staged Fly secrets.

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  migrate-staging:
    name: Staging · 1 · Run DB migrations
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Run Drizzle migrations
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: bash .github/scripts/run-migrate.sh

  derive-sentry-release:
    name: Staging · 2 · Derive Sentry release
    runs-on: ubuntu-latest
    environment: staging
    needs: migrate-staging
    outputs:
      release: ${{ steps.release.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive Sentry release
        id: release
        run: bash .github/scripts/derive-sentry-release.sh

  deploy-api:
    name: Staging · 3 · Deploy API
    runs-on: ubuntu-latest
    environment: staging
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build API
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/api...

      - name: Create Sentry release and upload API source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-api
        run: >-
          bash .github/scripts/sentry-release.sh api apps/api/dist
          "${{ needs.derive-sentry-release.outputs.release }}" staging

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy API to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: pipewatch-staging-api
        run: bash .github/scripts/deploy-fly.sh api

  deploy-worker:
    name: Staging · 3 · Deploy worker
    runs-on: ubuntu-latest
    environment: staging
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build worker
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/worker...

      - name: Create Sentry release and upload worker source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-worker
        run: >-
          bash .github/scripts/sentry-release.sh worker apps/worker/dist
          "${{ needs.derive-sentry-release.outputs.release }}" staging

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy worker to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: pipewatch-staging-worker
        run: bash .github/scripts/deploy-fly.sh worker

  deploy-web:
    name: Staging · 3 · Deploy web
    runs-on: ubuntu-latest
    environment: staging
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy web to Cloudflare Workers (OpenNext)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: pipewatch-staging-web
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-web
          SENTRY_RELEASE: ${{ needs.derive-sentry-release.outputs.release }}
          SENTRY_ENVIRONMENT: staging
        run: bash .github/scripts/deploy-cf-worker.sh web

  deploy-marketing:
    name: Staging · 3 · Deploy marketing
    runs-on: ubuntu-latest
    environment: staging
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy marketing to Cloudflare Workers (OpenNext)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: pipewatch-staging-marketing
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-marketing
          SENTRY_RELEASE: ${{ needs.derive-sentry-release.outputs.release }}
          SENTRY_ENVIRONMENT: staging
        run: bash .github/scripts/deploy-cf-worker.sh marketing

  smoke-staging:
    name: Staging · 4 · Smoke
    runs-on: ubuntu-latest
    environment: staging
    needs: [deploy-api, deploy-worker, deploy-web, deploy-marketing]
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      APP_URL: ${{ secrets.APP_URL }}
      MARKETING_URL: ${{ secrets.MARKETING_URL }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Smoke deploy surfaces
        run: bash .github/scripts/smoke-staging-health.sh
