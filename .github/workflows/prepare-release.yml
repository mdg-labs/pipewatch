name: Prepare Release

# Draft GitHub Release after api/web production deploy (PRD §22).

on:
  workflow_call:
    inputs:
      deploy-api:
        description: Whether api was deployed in this production run
        type: string
        required: true
      deploy-web:
        description: Whether web was deployed in this production run
        type: string
        required: true

permissions:
  contents: write

jobs:
  prepare:
    name: Release · Prepare draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_API: ${{ inputs.deploy-api }}
          DEPLOY_WEB: ${{ inputs.deploy-web }}
        run: node scripts/ci/create-draft-release.mjs
