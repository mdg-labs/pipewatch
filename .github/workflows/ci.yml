name: CI

# Reusable CI gate — lint, typecheck, unit, build, integration, audit.
# Called by orchestrator.yml on PR/push; never triggered directly (PRD §22).

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    name: CI · Checks
    runs-on: ubuntu-latest
    environment: ci
    env:
      REPORTPORTAL_URL: ${{ secrets.REPORTPORTAL_URL }}
      REPORTPORTAL_API_KEY: ${{ secrets.REPORTPORTAL_API_KEY }}
      REPORTPORTAL_PROJECT: ${{ secrets.REPORTPORTAL_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        id: typecheck
        run: pnpm typecheck

      - name: Check ReportPortal configuration
        run: |
          missing=()
          [ -z "${REPORTPORTAL_URL:-}" ] && missing+=("REPORTPORTAL_URL")
          [ -z "${REPORTPORTAL_PROJECT:-}" ] && missing+=("REPORTPORTAL_PROJECT")
          [ -z "${REPORTPORTAL_API_KEY:-}" ] && missing+=("REPORTPORTAL_API_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::ReportPortal disabled — unset: ${missing[*]} (set in GHA ci environment secrets)"
          else
            echo "ReportPortal configuration present"
          fi

      - name: Start ReportPortal unit launch
        id: rp-unit-start
        run: |
          uuid=$(node --experimental-strip-types scripts/reportportal-ci-launch.ts start unit || true)
          echo "launch_id=${uuid}" >> "$GITHUB_OUTPUT"
          if [ -n "$uuid" ]; then
            echo "RP_LAUNCH_ID=${uuid}" >> "$GITHUB_ENV"
          fi

      - name: Unit tests
        id: unit-tests
        run: pnpm test:unit

      - name: Finish ReportPortal unit launch
        if: always() && steps.rp-unit-start.outputs.launch_id != ''
        env:
          RP_LAUNCH_STATUS: ${{ steps.unit-tests.outcome == 'success' && 'PASSED' || 'FAILED' }}
        run: |
          node --experimental-strip-types scripts/reportportal-ci-launch.ts finish unit \
            "${{ steps.rp-unit-start.outputs.launch_id }}" \
            "$RP_LAUNCH_STATUS"

      - name: Record ReportPortal unit launch
        if: always() && steps.rp-unit-start.outputs.launch_id != ''
        env:
          RP_LAUNCH_UUID: ${{ steps.rp-unit-start.outputs.launch_id }}
        run: bash scripts/reportportal-ci-summary.sh record-env unit

      - name: Build
        if: always() && steps.typecheck.outcome == 'success'
        env:
          NODE_ENV: production
        run: pnpm build

      - name: Validate sync-secrets manifest
        if: always() && steps.typecheck.outcome == 'success'
        run: node --experimental-strip-types scripts/validate-sync-secrets-manifest.ts

      - name: Validate workflow secrets policy
        if: always() && steps.typecheck.outcome == 'success'
        run: node --experimental-strip-types scripts/validate-workflow-secrets-policy.ts

      - name: Start ReportPortal integration launch
        if: always() && steps.typecheck.outcome == 'success'
        id: rp-integration-start
        run: |
          uuid=$(node --experimental-strip-types scripts/reportportal-ci-launch.ts start integration || true)
          echo "launch_id=${uuid}" >> "$GITHUB_OUTPUT"
          if [ -n "$uuid" ]; then
            echo "RP_LAUNCH_ID=${uuid}" >> "$GITHUB_ENV"
          fi

      - name: Integration tests
        if: always() && steps.typecheck.outcome == 'success'
        id: integration-tests
        run: bash .github/scripts/run-integration-ci.sh

      - name: Finish ReportPortal integration launch
        if: always() && steps.rp-integration-start.outputs.launch_id != ''
        env:
          RP_LAUNCH_STATUS: ${{ steps.integration-tests.outcome == 'success' && 'PASSED' || 'FAILED' }}
        run: |
          node --experimental-strip-types scripts/reportportal-ci-launch.ts finish integration \
            "${{ steps.rp-integration-start.outputs.launch_id }}" \
            "$RP_LAUNCH_STATUS"

      - name: Record ReportPortal integration launch
        if: always() && steps.rp-integration-start.outputs.launch_id != ''
        env:
          RP_LAUNCH_UUID: ${{ steps.rp-integration-start.outputs.launch_id }}
        run: bash scripts/reportportal-ci-summary.sh record-env integration

      - name: Dependency audit
        if: always() && steps.typecheck.outcome == 'success'
        run: pnpm audit --audit-level=high

      - name: Upload ReportPortal launch state
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reportportal-ci-launches
          path: reportportal-launches.jsonl
          if-no-files-found: ignore

      - name: ReportPortal summary pointer
        if: always()
        run: echo 'ReportPortal launch links are in the **CI · ReportPortal summary** job below.' >> "$GITHUB_STEP_SUMMARY"

  reportportal-summary:
    name: CI · ReportPortal summary
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
      pull-requests: write
    env:
      REPORTPORTAL_SUMMARY_URL: ${{ secrets.REPORTPORTAL_URL }}
      REPORTPORTAL_SUMMARY_PROJECT: ${{ secrets.REPORTPORTAL_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download ReportPortal launch state
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: reportportal-ci-launches

      - name: ReportPortal job summary
        if: always()
        run: bash scripts/reportportal-ci-summary.sh write-summary ci

      - name: ReportPortal PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/reportportal-ci-summary.sh update-pr-comment ci
