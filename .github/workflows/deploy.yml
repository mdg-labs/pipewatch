name: Deploy

# Parameterized deploy pipeline — provision → sync → migrate → Sentry → parallel deploys → smoke.
# Called from staging.yml (after CI) and release.yml (production, after check-not-deployed).
# workflow_call only — no direct triggers (PRD §22).

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Actions environment (staging | production)
        type: string
        required: true
      ref:
        description: Checkout ref (production release tag; omit for staging)
        type: string
        required: false
        default: ""
      should_deploy:
        description: >-
          When false, run provision/sync only and skip migrate through smoke
          (production re-publish of an already-deployed tag).
        type: string
        required: false
        default: "true"

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}${{ inputs.ref != '' && format('-{0}', inputs.ref) || '' }}
  cancel-in-progress: ${{ inputs.environment != 'production' }}

jobs:
  provision-fly:
    name: Provision Fly apps (${{ inputs.environment }})
    uses: ./.github/workflows/provision-fly.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  provision-redis:
    name: Provision Fly Redis (${{ inputs.environment }})
    needs: [provision-fly]
    uses: ./.github/workflows/provision-redis.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  sync-secrets:
    name: Sync secrets (${{ inputs.environment }})
    needs: [provision-redis]
    uses: ./.github/workflows/sync-secrets.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  migrate:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 1 · Run DB migrations
    if: inputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [sync-secrets]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Run Drizzle migrations
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: bash .github/scripts/run-migrate.sh

  derive-sentry-release:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 2 · Derive Sentry release
    if: inputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: migrate
    outputs:
      release: ${{ steps.release.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Derive Sentry release
        id: release
        env:
          RELEASE_VERSION: ${{ inputs.ref }}
        run: bash .github/scripts/derive-sentry-release.sh

  deploy-api:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 3 · Deploy API
    if: inputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build API
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/api...

      - name: Create Sentry release and upload API source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-api
        run: >-
          bash .github/scripts/sentry-release.sh api apps/api/dist
          "${{ needs.derive-sentry-release.outputs.release }}" ${{ inputs.environment }}

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy API to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: pipewatch-${{ inputs.environment == 'production' && 'prod' || 'staging' }}-api
        run: bash .github/scripts/deploy-fly.sh api

  deploy-worker:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 3 · Deploy worker
    if: inputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build worker
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/worker...

      - name: Create Sentry release and upload worker source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-worker
        run: >-
          bash .github/scripts/sentry-release.sh worker apps/worker/dist
          "${{ needs.derive-sentry-release.outputs.release }}" ${{ inputs.environment }}

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy worker to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: pipewatch-${{ inputs.environment == 'production' && 'prod' || 'staging' }}-worker
        run: bash .github/scripts/deploy-fly.sh worker

  deploy-web:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 3 · Deploy web
    if: inputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy web to Cloudflare Workers (OpenNext)
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: pipewatch-${{ inputs.environment == 'production' && 'prod' || 'staging' }}-web
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          PIPEWATCH_EDITION: ${{ secrets.PIPEWATCH_EDITION }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-web
          SENTRY_RELEASE: ${{ needs.derive-sentry-release.outputs.release }}
          SENTRY_ENVIRONMENT: ${{ inputs.environment }}
        run: bash .github/scripts/deploy-cf-worker.sh web

  deploy-marketing:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 3 · Deploy marketing
    if: inputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy marketing to Cloudflare Workers (OpenNext)
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: pipewatch-${{ inputs.environment == 'production' && 'prod' || 'staging' }}-marketing
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-marketing
          SENTRY_RELEASE: ${{ needs.derive-sentry-release.outputs.release }}
          SENTRY_ENVIRONMENT: ${{ inputs.environment }}
        run: bash .github/scripts/deploy-cf-worker.sh marketing

  smoke:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 4 · Smoke
    if: inputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [deploy-api, deploy-worker, deploy-web, deploy-marketing]
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      APP_URL: ${{ secrets.APP_URL }}
      MARKETING_URL: ${{ secrets.MARKETING_URL }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Smoke deploy surfaces
        run: bash .github/scripts/smoke-staging-health.sh
