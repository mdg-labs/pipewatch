name: Deploy

# Parameterized deploy pipeline — plan → provision Fly apps + Redis → sync → migrate → deploy → smoke.
# Called from staging.yml (after CI + shared plan) and release.yml (production).
# workflow_call only — no direct triggers (PRD §22).

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Actions environment (staging | production)
        type: string
        required: true
      ref:
        description: Checkout ref (production release tag; omit for staging)
        type: string
        required: false
        default: ""
      should_deploy:
        description: >-
          When false, run sync only and skip migrate through smoke
          (production re-publish of an already-deployed tag).
        type: string
        required: false
        default: "true"
      force_full_deploy:
        description: >-
          Deploy all surfaces regardless of live version compare (maps to manual plan mode).
        type: string
        required: false
        default: "false"
      deploy_mode:
        description: auto (live /version probes) | manual (skip live compare)
        type: string
        required: false
        default: "auto"
      caller_plan:
        description: When true, use plan inputs from caller (skip live /version probes)
        type: string
        required: false
        default: "false"
      deploy_api:
        description: Caller plan — deploy API
        type: string
        required: false
        default: "false"
      deploy_worker:
        description: Caller plan — deploy worker
        type: string
        required: false
        default: "false"
      deploy_web:
        description: Caller plan — deploy web
        type: string
        required: false
        default: "false"
      deploy_marketing:
        description: Caller plan — deploy marketing
        type: string
        required: false
        default: "false"
      deploy_admin:
        description: Caller plan — deploy admin
        type: string
        required: false
        default: "false"
      run_migrate:
        description: Caller plan — run API migrations
        type: string
        required: false
        default: "false"
      run_migrate_admin:
        description: Caller plan — run admin migrations
        type: string
        required: false
        default: "false"
      push_ghcr_api:
        description: Caller plan — push API GHCR image
        type: string
        required: false
        default: "false"
      push_ghcr_worker:
        description: Caller plan — push worker GHCR image
        type: string
        required: false
        default: "false"
      push_ghcr_web:
        description: Caller plan — push web GHCR image
        type: string
        required: false
        default: "false"
      sync_services:
        description: Caller plan — sync-secrets services list
        type: string
        required: false
        default: "none"
      skip_reasons:
        description: Caller plan — skip reasons (newline-separated)
        type: string
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}${{ inputs.ref != '' && format('-{0}', inputs.ref) || '' }}
  cancel-in-progress: ${{ inputs.environment != 'production' }}

jobs:
  plan:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 0 · Deploy plan
    if: >-
      inputs.caller_plan == 'true' ||
      inputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      deploy_api: ${{ steps.plan.outputs.deploy_api }}
      deploy_worker: ${{ steps.plan.outputs.deploy_worker }}
      deploy_web: ${{ steps.plan.outputs.deploy_web }}
      deploy_marketing: ${{ steps.plan.outputs.deploy_marketing }}
      deploy_admin: ${{ steps.plan.outputs.deploy_admin }}
      run_migrate: ${{ steps.plan.outputs.run_migrate }}
      run_migrate_admin: ${{ steps.plan.outputs.run_migrate_admin }}
      push_ghcr_api: ${{ steps.plan.outputs.push_ghcr_api }}
      push_ghcr_worker: ${{ steps.plan.outputs.push_ghcr_worker }}
      push_ghcr_web: ${{ steps.plan.outputs.push_ghcr_web }}
      sync_services: ${{ steps.plan.outputs.sync_services }}
      deployed_api: ${{ steps.plan.outputs.deployed_api }}
      deployed_web: ${{ steps.plan.outputs.deployed_web }}
      skip_reasons: ${{ steps.plan.outputs.skip_reasons }}
    steps:
      - name: Checkout
        if: inputs.caller_plan != 'true'
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Resolve or apply deploy plan
        id: plan
        env:
          CALLER_PLAN: ${{ inputs.caller_plan }}
          DEPLOY_API: ${{ inputs.deploy_api }}
          DEPLOY_WORKER: ${{ inputs.deploy_worker }}
          DEPLOY_WEB: ${{ inputs.deploy_web }}
          DEPLOY_MARKETING: ${{ inputs.deploy_marketing }}
          DEPLOY_ADMIN: ${{ inputs.deploy_admin }}
          RUN_MIGRATE: ${{ inputs.run_migrate }}
          RUN_MIGRATE_ADMIN: ${{ inputs.run_migrate_admin }}
          PUSH_GHCR_API: ${{ inputs.push_ghcr_api }}
          PUSH_GHCR_WORKER: ${{ inputs.push_ghcr_worker }}
          PUSH_GHCR_WEB: ${{ inputs.push_ghcr_web }}
          SYNC_SERVICES: ${{ inputs.sync_services }}
          SKIP_REASONS: ${{ inputs.skip_reasons }}
          ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_MODE: ${{ inputs.deploy_mode }}
          SHOULD_DEPLOY: ${{ inputs.should_deploy }}
          FORCE_FULL_DEPLOY: ${{ inputs.force_full_deploy }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          API_ORIGIN: ${{ secrets.API_ORIGIN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          APP_URL: ${{ secrets.APP_URL }}
          MARKETING_ORIGIN: ${{ secrets.MARKETING_ORIGIN }}
          MARKETING_URL: ${{ secrets.MARKETING_URL }}
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          WORKER_PROBE_URL: ${{ secrets.WORKER_PROBE_URL }}
          CF_ACCESS_CLIENT_ID: ${{ inputs.environment == 'staging' && secrets.CF_ACCESS_CLIENT_ID || '' }}
          CF_ACCESS_CLIENT_SECRET: ${{ inputs.environment == 'staging' && secrets.CF_ACCESS_CLIENT_SECRET || '' }}
        run: |
          if [ "${CALLER_PLAN}" = "true" ]; then
            echo "deploy_api=${DEPLOY_API}" >> "$GITHUB_OUTPUT"
            echo "deploy_worker=${DEPLOY_WORKER}" >> "$GITHUB_OUTPUT"
            echo "deploy_web=${DEPLOY_WEB}" >> "$GITHUB_OUTPUT"
            echo "deploy_marketing=${DEPLOY_MARKETING}" >> "$GITHUB_OUTPUT"
            echo "deploy_admin=${DEPLOY_ADMIN}" >> "$GITHUB_OUTPUT"
            echo "run_migrate=${RUN_MIGRATE}" >> "$GITHUB_OUTPUT"
            echo "run_migrate_admin=${RUN_MIGRATE_ADMIN}" >> "$GITHUB_OUTPUT"
            echo "push_ghcr_api=${PUSH_GHCR_API}" >> "$GITHUB_OUTPUT"
            echo "push_ghcr_worker=${PUSH_GHCR_WORKER}" >> "$GITHUB_OUTPUT"
            echo "push_ghcr_web=${PUSH_GHCR_WEB}" >> "$GITHUB_OUTPUT"
            echo "sync_services=${SYNC_SERVICES}" >> "$GITHUB_OUTPUT"
            echo "deployed_api=false" >> "$GITHUB_OUTPUT"
            echo "deployed_web=false" >> "$GITHUB_OUTPUT"
            echo "skip_reasons<<EOF" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${SKIP_REASONS}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            node scripts/ci/resolve-deploy-plan.mjs
          fi

      - name: Write deploy plan summary
        if: inputs.caller_plan != 'true'
        env:
          DEPLOY_API: ${{ steps.plan.outputs.deploy_api }}
          DEPLOY_WORKER: ${{ steps.plan.outputs.deploy_worker }}
          DEPLOY_WEB: ${{ steps.plan.outputs.deploy_web }}
          DEPLOY_MARKETING: ${{ steps.plan.outputs.deploy_marketing }}
          DEPLOY_ADMIN: ${{ steps.plan.outputs.deploy_admin }}
          SYNC_SERVICES: ${{ steps.plan.outputs.sync_services }}
          SKIP_REASONS: ${{ steps.plan.outputs.skip_reasons }}
        run: |
          {
            echo "### Deploy plan (${{ inputs.environment }})"
            echo ""
            echo "| Surface | Deploy |"
            echo "|---|---|"
            echo "| API | ${DEPLOY_API} |"
            echo "| Worker | ${DEPLOY_WORKER} |"
            echo "| Web | ${DEPLOY_WEB} |"
            echo "| Marketing | ${DEPLOY_MARKETING} |"
            echo "| Admin | ${DEPLOY_ADMIN} |"
            echo ""
            echo "**sync-secrets services:** \`${SYNC_SERVICES}\`"
            if [ -n "${SKIP_REASONS}" ]; then
              echo ""
              echo "### Skipped surfaces"
              echo ""
              while IFS= read -r reason; do
                [ -z "${reason}" ] && continue
                echo "- ${reason}"
              done <<< "${SKIP_REASONS}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  provision-fly:
    name: Provision Fly apps (${{ inputs.environment }})
    needs: [plan]
    if: >-
      always() &&
      (
        inputs.caller_plan == 'true' ||
        needs.plan.result == 'success'
      )
    uses: ./.github/workflows/provision-fly.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  provision-redis:
    name: Provision Fly Redis (${{ inputs.environment }})
    needs: [plan, provision-fly]
    if: >-
      always() &&
      needs.provision-fly.result == 'success'
    uses: ./.github/workflows/provision-redis.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  sync-secrets:
    name: Sync secrets (${{ inputs.environment }})
    needs: [plan, provision-redis]
    if: >-
      always() &&
      needs.provision-redis.result == 'success' &&
      (
        inputs.should_deploy != 'true' ||
        (
          needs.plan.result == 'success' &&
          needs.plan.outputs.sync_services != 'none'
        )
      )
    uses: ./.github/workflows/sync-secrets.yml
    with:
      environment: ${{ inputs.environment }}
      services: ${{ inputs.should_deploy == 'true' && needs.plan.outputs.sync_services || 'all' }}
    secrets: inherit

  migrate:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 1 · Run DB migrations
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.outputs.run_migrate == 'true' &&
      needs.sync-secrets.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [plan, sync-secrets]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Run Drizzle migrations
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: bash scripts/ci/run-migrate.sh

  migrate-admin:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 1 · Run admin DB migrations
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.outputs.run_migrate_admin == 'true' &&
      needs.sync-secrets.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [plan, sync-secrets]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Run admin Drizzle migrations
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: bash scripts/ci/run-migrate-admin.sh

  derive-sentry-release-api:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 2 · Derive API Sentry release
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.outputs.deploy_api == 'true' &&
      needs.sync-secrets.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [plan, sync-secrets]
    outputs:
      release: ${{ steps.release.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Derive API Sentry release
        id: release
        env:
          GIT_SHA: ${{ github.sha }}
        run: bash scripts/ci/derive-sentry-release.sh --package api

  derive-sentry-release-web:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 2 · Derive web Sentry release
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.outputs.deploy_web == 'true' &&
      needs.sync-secrets.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [plan, sync-secrets]
    outputs:
      release: ${{ steps.release.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Derive web Sentry release
        id: release
        env:
          GIT_SHA: ${{ github.sha }}
        run: bash scripts/ci/derive-sentry-release.sh --package web

  deploy-api:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 3 · Deploy API
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.outputs.deploy_api == 'true' &&
      needs.sync-secrets.result == 'success' &&
      needs.migrate.result != 'failure' &&
      needs.derive-sentry-release-api.result != 'failure' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
      (needs.derive-sentry-release-api.result == 'success' || needs.derive-sentry-release-api.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [plan, sync-secrets, migrate, derive-sentry-release-api]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build API
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/api...

      - name: Create Sentry release and upload API source maps
        if: needs.derive-sentry-release-api.result == 'success'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-api
        run: >-
          bash scripts/ci/sentry-release.sh api apps/api/dist
          "${{ needs.derive-sentry-release-api.outputs.release }}" ${{ inputs.environment }}

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy API to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: pipewatch-${{ inputs.environment == 'production' && 'prod' || 'staging' }}-api
        run: bash scripts/ci/deploy-fly.sh api

  deploy-worker:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 3 · Deploy worker
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.outputs.deploy_worker == 'true' &&
      needs.sync-secrets.result == 'success' &&
      needs.migrate.result != 'failure' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [plan, sync-secrets, migrate, derive-sentry-release-api]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build worker
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/worker...

      - name: Create Sentry release and upload worker source maps
        if: needs.derive-sentry-release-api.result == 'success'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-worker
        run: >-
          bash scripts/ci/sentry-release.sh worker apps/worker/dist
          "${{ needs.derive-sentry-release-api.outputs.release }}" ${{ inputs.environment }}

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy worker to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: pipewatch-${{ inputs.environment == 'production' && 'prod' || 'staging' }}-worker
        run: bash scripts/ci/deploy-fly.sh worker

  deploy-admin:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 3 · Deploy admin
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.outputs.deploy_admin == 'true' &&
      needs.sync-secrets.result == 'success' &&
      needs.migrate-admin.result != 'failure' &&
      (needs.migrate-admin.result == 'success' || needs.migrate-admin.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [plan, sync-secrets, migrate-admin, derive-sentry-release-api]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build admin
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/admin...

      - name: Create Sentry release and upload admin source maps
        if: needs.derive-sentry-release-api.result == 'success'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-admin
        run: >-
          bash scripts/ci/sentry-release.sh admin apps/admin/dist
          "${{ needs.derive-sentry-release-api.outputs.release }}" ${{ inputs.environment }}

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy admin to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: pipewatch-${{ inputs.environment == 'production' && 'prod' || 'staging' }}-admin
        run: bash scripts/ci/deploy-fly.sh admin

  deploy-web:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 3 · Deploy web
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.outputs.deploy_web == 'true' &&
      needs.sync-secrets.result == 'success' &&
      needs.migrate.result != 'failure' &&
      needs.derive-sentry-release-web.result != 'failure' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') &&
      (needs.derive-sentry-release-web.result == 'success' || needs.derive-sentry-release-web.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [plan, sync-secrets, migrate, derive-sentry-release-web]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy web to Cloudflare Workers (OpenNext)
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: pipewatch-${{ inputs.environment == 'production' && 'prod' || 'staging' }}-web
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          PIPEWATCH_EDITION: ${{ secrets.PIPEWATCH_EDITION }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-web
          SENTRY_RELEASE: ${{ needs.derive-sentry-release-web.outputs.release }}
          SENTRY_ENVIRONMENT: ${{ inputs.environment }}
        run: bash scripts/ci/deploy-cf-worker.sh web

  deploy-marketing:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 3 · Deploy marketing
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.outputs.deploy_marketing == 'true' &&
      needs.sync-secrets.result == 'success' &&
      needs.migrate.result != 'failure' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [plan, sync-secrets, migrate]
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy marketing to Cloudflare Workers (Astro)
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: pipewatch-${{ inputs.environment == 'production' && 'prod' || 'staging' }}-marketing
          PIPEWATCH_EDITION: ${{ secrets.PIPEWATCH_EDITION }}
          LAUNCH_MODE: ${{ secrets.LAUNCH_MODE }}
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}
          UMAMI_SCRIPT_URL: ${{ secrets.UMAMI_SCRIPT_URL }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
        run: bash scripts/ci/deploy-cf-worker.sh marketing

  smoke:
    name: ${{ inputs.environment == 'production' && 'Production' || 'Staging' }} · 4 · Smoke
    if: >-
      always() &&
      inputs.should_deploy == 'true' &&
      needs.plan.result == 'success' &&
      (
        needs.plan.outputs.deploy_api == 'true' ||
        needs.plan.outputs.deploy_worker == 'true' ||
        needs.plan.outputs.deploy_web == 'true' ||
        needs.plan.outputs.deploy_marketing == 'true' ||
        needs.plan.outputs.deploy_admin == 'true'
      ) &&
      needs.deploy-api.result != 'failure' &&
      needs.deploy-worker.result != 'failure' &&
      needs.deploy-web.result != 'failure' &&
      needs.deploy-marketing.result != 'failure' &&
      needs.deploy-admin.result != 'failure'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      [
        plan,
        deploy-api,
        deploy-worker,
        deploy-web,
        deploy-marketing,
        deploy-admin,
      ]
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      API_ORIGIN: ${{ secrets.API_ORIGIN }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
      APP_URL: ${{ secrets.APP_URL }}
      MARKETING_ORIGIN: ${{ secrets.MARKETING_ORIGIN }}
      MARKETING_URL: ${{ secrets.MARKETING_URL }}
      ADMIN_URL: ${{ secrets.ADMIN_URL }}
      WORKER_PROBE_URL: ${{ secrets.WORKER_PROBE_URL }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Build smoke flags
        id: smoke_flags
        run: |
          FLAGS=()
          if [ "${{ needs.plan.outputs.deploy_api }}" = "true" ]; then
            FLAGS+=(--api)
          fi
          if [ "${{ needs.plan.outputs.deploy_worker }}" = "true" ]; then
            if [ -n "${WORKER_PROBE_URL:-}" ] && [[ "${WORKER_PROBE_URL}" != *".internal"* ]]; then
              FLAGS+=(--worker)
            fi
          fi
          if [ "${{ needs.plan.outputs.deploy_web }}" = "true" ]; then
            FLAGS+=(--web)
          fi
          if [ "${{ needs.plan.outputs.deploy_marketing }}" = "true" ]; then
            FLAGS+=(--marketing)
          fi
          if [ "${{ needs.plan.outputs.deploy_admin }}" = "true" ]; then
            FLAGS+=(--admin)
          fi
          echo "flags=${FLAGS[*]}" >> "$GITHUB_OUTPUT"

      - name: Smoke deployed surfaces
        if: steps.smoke_flags.outputs.flags != ''
        run: bash scripts/ci/smoke-staging-health.sh ${{ steps.smoke_flags.outputs.flags }}
