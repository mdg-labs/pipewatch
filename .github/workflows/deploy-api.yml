name: Deploy API

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Actions environment (staging | production)
        type: string
        required: true
      app:
        description: Fly.io app name (e.g. pipewatch-staging-api)
        type: string
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy API (${{ inputs.app }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: ${{ inputs.app }}
        run: bash .github/scripts/deploy-fly.sh api
