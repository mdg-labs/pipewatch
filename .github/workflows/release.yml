name: Release

# Published release — production deploy plan + selective deploy, CE image tags (PRD §22).

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  check-not-deployed:
    name: Production · 0 · Check deploy needed
    runs-on: ubuntu-latest
    environment: production
    outputs:
      should_deploy: ${{ steps.compare.outputs.should_deploy }}
      release_tag: ${{ steps.compare.outputs.release_tag }}
    steps:
      - name: Compare release tag to deployed version
        id: compare
        run: |
          TAG="${{ github.event.release.tag_name }}"
          DEPLOYED="${{ vars.DEPLOYED_VERSION }}"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "$DEPLOYED" ] && [ "$TAG" = "$DEPLOYED" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already deployed — skipping"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploying release ${TAG}"
          fi

  plan:
    name: Production · Deploy plan
    needs: [check-not-deployed]
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-plan.yml
    with:
      environment: production
      ref: ${{ github.event.release.tag_name }}
      deploy_mode: auto
      force_full_deploy: "false"
      should_deploy: ${{ needs.check-not-deployed.outputs.should_deploy }}
    secrets: inherit

  deploy:
    name: Deploy production
    needs: [check-not-deployed, plan]
    permissions:
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      ref: ${{ github.event.release.tag_name }}
      should_deploy: ${{ needs.check-not-deployed.outputs.should_deploy }}
      deploy_mode: auto
      caller_plan: "true"
      deploy_api: ${{ needs.plan.outputs.deploy_api }}
      deploy_worker: ${{ needs.plan.outputs.deploy_worker }}
      deploy_web: ${{ needs.plan.outputs.deploy_web }}
      deploy_marketing: ${{ needs.plan.outputs.deploy_marketing }}
      deploy_admin: ${{ needs.plan.outputs.deploy_admin }}
      run_migrate: ${{ needs.plan.outputs.run_migrate }}
      run_migrate_admin: ${{ needs.plan.outputs.run_migrate_admin }}
      push_ghcr_api: ${{ needs.plan.outputs.push_ghcr_api }}
      push_ghcr_worker: ${{ needs.plan.outputs.push_ghcr_worker }}
      push_ghcr_web: ${{ needs.plan.outputs.push_ghcr_web }}
      sync_services: ${{ needs.plan.outputs.sync_services }}
      skip_reasons: ${{ needs.plan.outputs.skip_reasons }}
    secrets: inherit

  record-deployed-version:
    name: Production · 5 · Record deployed version
    needs: [check-not-deployed, deploy]
    if: >-
      needs.check-not-deployed.outputs.should_deploy == 'true'
      && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: write
    steps:
      - name: Update DEPLOYED_VERSION
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh variable set DEPLOYED_VERSION --body "${{ github.event.release.tag_name }}"

  ce-images-api:
    name: Build CE image · api (release)
    needs: [check-not-deployed, plan, deploy]
    if: >-
      needs.check-not-deployed.outputs.should_deploy == 'true' &&
      needs.deploy.result == 'success' &&
      needs.plan.outputs.push_ghcr_api == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-ce-image.yml
    with:
      service: api
      tags: |
        latest
        ${{ github.event.release.tag_name }}
    secrets: inherit

  ce-images-worker:
    name: Build CE image · worker (release)
    needs: [check-not-deployed, plan, deploy]
    if: >-
      needs.check-not-deployed.outputs.should_deploy == 'true' &&
      needs.deploy.result == 'success' &&
      needs.plan.outputs.push_ghcr_worker == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-ce-image.yml
    with:
      service: worker
      tags: |
        latest
        ${{ github.event.release.tag_name }}
    secrets: inherit

  ce-images-web:
    name: Build CE image · web (release)
    needs: [check-not-deployed, plan, deploy]
    if: >-
      needs.check-not-deployed.outputs.should_deploy == 'true' &&
      needs.deploy.result == 'success' &&
      needs.plan.outputs.push_ghcr_web == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-ce-image.yml
    with:
      service: web
      tags: |
        latest
        ${{ github.event.release.tag_name }}
    secrets: inherit
