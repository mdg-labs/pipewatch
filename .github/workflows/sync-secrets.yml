name: Sync secrets

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Actions environment (staging | production)
        type: string
        required: true
      services:
        description: Comma-separated services or "all"
        type: string
        default: all
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging, production]
        required: true
      services:
        description: Services to sync (comma-separated, or "all")
        type: string
        default: all

permissions:
  contents: read

jobs:
  sync:
    name: Sync secrets (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Sync secrets to Fly.io and Cloudflare Workers
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          PIPEWATCH_EDITION: ${{ secrets.PIPEWATCH_EDITION }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          SENTRY_DSN_API: ${{ secrets.SENTRY_DSN_API }}
          SENTRY_DSN_WORKER: ${{ secrets.SENTRY_DSN_WORKER }}
          SENTRY_DSN_WEB: ${{ secrets.SENTRY_DSN_WEB }}
          SENTRY_DSN_ADMIN: ${{ secrets.SENTRY_DSN_ADMIN }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
          ADMIN_BOOTSTRAP_EMAIL: ${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}
          ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GH_APP_SLUG: ${{ secrets.GH_APP_SLUG }}
          APP_URL: ${{ secrets.APP_URL }}
          MARKETING_URL: ${{ secrets.MARKETING_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          POSTMARK_API_KEY: ${{ secrets.POSTMARK_API_KEY }}
          POSTMARK_BROADCAST_STREAM: ${{ secrets.POSTMARK_BROADCAST_STREAM }}
          POSTMARK_WEBHOOK_SECRET: ${{ secrets.POSTMARK_WEBHOOK_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_PRO: ${{ secrets.STRIPE_PRICE_PRO }}
          STRIPE_PRICE_BUSINESS: ${{ secrets.STRIPE_PRICE_BUSINESS }}
          PIPEWATCH_MODE: ${{ secrets.PIPEWATCH_MODE }}
          RETENTION_DAYS: ${{ secrets.RETENTION_DAYS }}
          LAUNCH_MODE: ${{ secrets.LAUNCH_MODE }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}
          UMAMI_SCRIPT_URL: ${{ secrets.UMAMI_SCRIPT_URL }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          FLY_SECRETS_MODE: ${{ github.event_name == 'workflow_dispatch' && 'stage-and-deploy' || 'stage-only' }}
        run: bash scripts/ci/sync-secrets.sh "${{ inputs.environment }}" "${{ inputs.services }}"
