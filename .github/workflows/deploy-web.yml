name: Deploy web

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Actions environment (staging | production)
        type: string
        required: true
      worker:
        description: Cloudflare Worker name (e.g. pipewatch-staging-web)
        type: string
        required: true
      sentry_release:
        description: Sentry release identifier (pipewatch@version+sha)
        type: string
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy web (${{ inputs.worker }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy web to Cloudflare Workers (OpenNext)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_WORKER_NAME: ${{ inputs.worker }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-web
          SENTRY_RELEASE: ${{ inputs.sentry_release }}
          SENTRY_ENVIRONMENT: ${{ inputs.environment }}
        run: bash .github/scripts/deploy-cf-worker.sh web
