name: Deploy Production

# Production deploy pipeline — reusable workflow called from orchestrator.yml on release published (PRD §22).
# Prerequisite: orchestrator runs sync-secrets (production) before this workflow (#132).
# Job chain: check-not-deployed → migrate → derive Sentry release → parallel deploys → smoke → record.

on:
  workflow_call:
    inputs:
      release_tag:
        description: Git tag for the published release (e.g. v1.2.3)
        type: string
        required: true
    outputs:
      deployed:
        description: >-
          True when a new production deploy completed and DEPLOYED_VERSION was recorded;
          false when the tag was already deployed or the deploy chain did not finish.
        value: ${{ jobs.record-deployed-version.result == 'success' }}

permissions:
  contents: read

concurrency:
  group: deploy-production-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  check-not-deployed:
    name: Production · 0 · Check deploy needed
    runs-on: ubuntu-latest
    environment: production
    outputs:
      should_deploy: ${{ steps.compare.outputs.should_deploy }}
      release_tag: ${{ steps.compare.outputs.release_tag }}
    steps:
      - name: Compare release tag to deployed version
        id: compare
        run: |
          TAG="${{ inputs.release_tag }}"
          DEPLOYED="${{ vars.DEPLOYED_VERSION }}"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "$DEPLOYED" ] && [ "$TAG" = "$DEPLOYED" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already deployed — skipping"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploying release ${TAG}"
          fi

  migrate-production:
    name: Production · 1 · Run DB migrations
    runs-on: ubuntu-latest
    environment: production
    needs: check-not-deployed
    if: needs.check-not-deployed.outputs.should_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Run Drizzle migrations
        env:
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
        run: bash .github/scripts/run-migrate.sh

  derive-sentry-release:
    name: Production · 2 · Derive Sentry release
    runs-on: ubuntu-latest
    environment: production
    needs: migrate-production
    outputs:
      release: ${{ steps.release.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Derive Sentry release
        id: release
        env:
          RELEASE_VERSION: ${{ inputs.release_tag }}
        run: bash .github/scripts/derive-sentry-release.sh

  deploy-api:
    name: Production · 3 · Deploy API
    runs-on: ubuntu-latest
    environment: production
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build API
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/api...

      - name: Create Sentry release and upload API source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-api
        run: >-
          bash .github/scripts/sentry-release.sh api apps/api/dist
          "${{ needs.derive-sentry-release.outputs.release }}" production

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy API to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: pipewatch-prod-api
        run: bash .github/scripts/deploy-fly.sh api

  deploy-worker:
    name: Production · 3 · Deploy worker
    runs-on: ubuntu-latest
    environment: production
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"

      - name: Build worker
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@pipewatch/worker...

      - name: Create Sentry release and upload worker source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-worker
        run: >-
          bash .github/scripts/sentry-release.sh worker apps/worker/dist
          "${{ needs.derive-sentry-release.outputs.release }}" production

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master

      - name: Deploy worker to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: pipewatch-prod-worker
        run: bash .github/scripts/deploy-fly.sh worker

  deploy-web:
    name: Production · 3 · Deploy web
    runs-on: ubuntu-latest
    environment: production
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy web to Cloudflare Workers (OpenNext)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: pipewatch-prod-web
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-web
          SENTRY_RELEASE: ${{ needs.derive-sentry-release.outputs.release }}
          SENTRY_ENVIRONMENT: production
        run: bash .github/scripts/deploy-cf-worker.sh web

  deploy-marketing:
    name: Production · 3 · Deploy marketing
    runs-on: ubuntu-latest
    environment: production
    needs: derive-sentry-release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Deploy marketing to Cloudflare Workers (OpenNext)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_WORKER_NAME: pipewatch-prod-marketing
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: pipewatch-marketing
          SENTRY_RELEASE: ${{ needs.derive-sentry-release.outputs.release }}
          SENTRY_ENVIRONMENT: production
        run: bash .github/scripts/deploy-cf-worker.sh marketing

  smoke-production:
    name: Production · 4 · Smoke
    runs-on: ubuntu-latest
    environment: production
    needs:
      [
        check-not-deployed,
        deploy-api,
        deploy-worker,
        deploy-web,
        deploy-marketing,
      ]
    if: needs.check-not-deployed.outputs.should_deploy == 'true'
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      APP_URL: ${{ secrets.APP_URL }}
      MARKETING_URL: ${{ secrets.MARKETING_URL }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Smoke deploy surfaces
        run: bash .github/scripts/smoke-staging-health.sh

  record-deployed-version:
    name: Production · 5 · Record deployed version
    runs-on: ubuntu-latest
    environment: production
    needs: [check-not-deployed, smoke-production]
    if: >-
      needs.check-not-deployed.outputs.should_deploy == 'true'
      && needs.smoke-production.result == 'success'
    permissions:
      actions: write
    steps:
      - name: Update DEPLOYED_VERSION
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh variable set DEPLOYED_VERSION --body "${{ inputs.release_tag }}"
