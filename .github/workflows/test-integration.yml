name: Integration tests

on:
  workflow_call:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    environment: ci
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pipewatch
          POSTGRES_USER: pipewatch
          POSTGRES_PASSWORD: pipewatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pipewatch -d pipewatch"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://pipewatch:pipewatch@postgres:5432/pipewatch
      REDIS_URL: redis://redis:6379
      REPORTPORTAL_URL: ${{ vars.REPORTPORTAL_URL }}
      REPORTPORTAL_API_KEY: ${{ secrets.REPORTPORTAL_API_KEY }}
      REPORTPORTAL_PROJECT: ${{ vars.REPORTPORTAL_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: bash .github/scripts/run-integration-ci.sh
