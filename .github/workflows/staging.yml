name: Staging

# Push to staging — CI gate, live-version deploy plan, selective deploy, plan-gated CE images (PRD §22).
# Manual dispatch: use `gh workflow run staging.yml --ref <git_ref>` so CI runs on the chosen ref.

on:
  push:
    branches: [staging]

  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag, or SHA to build and deploy
        type: string
        default: staging
      deploy_mode:
        description: auto (live /version probes) | manual (skip live compare)
        type: choice
        options:
          - auto
          - manual
        default: auto

permissions:
  contents: read

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-deploy-ref:
    name: Resolve deploy ref
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.ref.outputs.checkout_ref }}
      deploy_mode: ${{ steps.ref.outputs.deploy_mode }}
    steps:
      - name: Resolve ref and deploy mode
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "checkout_ref=${{ inputs.git_ref }}" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=${{ inputs.deploy_mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout git_ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ inputs.git_ref }}

      - name: Assert workflow ref matches git_ref
        if: github.event_name == 'workflow_dispatch'
        run: |
          TARGET_SHA="$(git rev-parse HEAD)"
          if [ "$TARGET_SHA" != "${{ github.sha }}" ]; then
            echo "::error::CI must run on git_ref. Re-dispatch with: gh workflow run staging.yml --ref ${{ inputs.git_ref }}"
            exit 1
          fi

  ci:
    name: CI
    needs: [resolve-deploy-ref]
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  meta:
    name: Resolve commit metadata
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  plan:
    name: Staging · Deploy plan
    needs: [ci, resolve-deploy-ref]
    if: needs.ci.result == 'success'
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-plan.yml
    with:
      environment: staging
      ref: ${{ needs.resolve-deploy-ref.outputs.checkout_ref }}
      deploy_mode: ${{ needs.resolve-deploy-ref.outputs.deploy_mode }}
      force_full_deploy: ${{ needs.resolve-deploy-ref.outputs.deploy_mode == 'manual' && 'true' || 'false' }}
      should_deploy: "true"
    secrets: inherit

  deploy:
    name: Deploy staging
    needs: [plan, resolve-deploy-ref]
    if: needs.plan.result == 'success'
    permissions:
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      ref: ${{ needs.resolve-deploy-ref.outputs.checkout_ref }}
      deploy_mode: ${{ needs.resolve-deploy-ref.outputs.deploy_mode }}
      force_full_deploy: ${{ needs.resolve-deploy-ref.outputs.deploy_mode == 'manual' && 'true' || 'false' }}
      caller_plan: "true"
      deploy_api: ${{ needs.plan.outputs.deploy_api }}
      deploy_worker: ${{ needs.plan.outputs.deploy_worker }}
      deploy_web: ${{ needs.plan.outputs.deploy_web }}
      deploy_marketing: ${{ needs.plan.outputs.deploy_marketing }}
      deploy_admin: ${{ needs.plan.outputs.deploy_admin }}
      run_migrate: ${{ needs.plan.outputs.run_migrate }}
      run_migrate_admin: ${{ needs.plan.outputs.run_migrate_admin }}
      push_ghcr_api: ${{ needs.plan.outputs.push_ghcr_api }}
      push_ghcr_worker: ${{ needs.plan.outputs.push_ghcr_worker }}
      push_ghcr_web: ${{ needs.plan.outputs.push_ghcr_web }}
      sync_services: ${{ needs.plan.outputs.sync_services }}
      skip_reasons: ${{ needs.plan.outputs.skip_reasons }}
    secrets: inherit

  ce-images-api:
    name: Build CE image · api (staging)
    needs: [ci, meta, plan]
    if: needs.plan.outputs.push_ghcr_api == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-ce-image.yml
    with:
      service: api
      tags: |
        dev
        ${{ needs.meta.outputs.short_sha }}
    secrets: inherit

  ce-images-worker:
    name: Build CE image · worker (staging)
    needs: [ci, meta, plan]
    if: needs.plan.outputs.push_ghcr_worker == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-ce-image.yml
    with:
      service: worker
      tags: |
        dev
        ${{ needs.meta.outputs.short_sha }}
    secrets: inherit

  ce-images-web:
    name: Build CE image · web (staging)
    needs: [ci, meta, plan]
    if: needs.plan.outputs.push_ghcr_web == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push-ce-image.yml
    with:
      service: web
      tags: |
        dev
        ${{ needs.meta.outputs.short_sha }}
    secrets: inherit
