# Fly.io background worker (PRD §4.2) — staging (always-on for reliable job processing).
# App name is overridden at deploy time via deploy-fly.sh (per-env app name).
# Secrets are staged by sync-secrets.yml and applied on flyctl deploy.

app = "pipewatch-staging-worker"
primary_region = "fra"

[build]
  dockerfile = "apps/worker/Dockerfile"

[http_service]
  internal_port = 3003
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
