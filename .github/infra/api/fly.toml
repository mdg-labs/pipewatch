# Fly.io API workload (PRD §4.2).
# App name is overridden at deploy time via deploy-fly.sh (per-env app name).
# Secrets are staged by sync-secrets.yml and applied on flyctl deploy.

app = "pipewatch-staging-api"
primary_region = "fra"

[build]
  dockerfile = "apps/api/Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
