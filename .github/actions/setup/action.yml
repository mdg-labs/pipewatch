name: Setup workspace
description: pnpm, Node.js, and frozen lockfile install (no runtime secret fetch)

inputs:
  skip-checkout:
    description: Set to true when checkout already ran in the job
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout
      if: inputs.skip-checkout != 'true'
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.15.4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
