name: Deploy Production

# Production deploy pipeline — runs on release published only (spec §22.7–22.8).
# Job dependency chain: check-not-deployed → build (parallel) → migrate → deploy → smoke → record.
# Deployment records are created automatically by the production GitHub Environment.

on:
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  check-not-deployed:
    name: Production · 1 · Check deploy needed
    runs-on: ubuntu-latest
    environment: production
    outputs:
      should_deploy: ${{ steps.compare.outputs.should_deploy }}
    steps:
      - name: Compare release tag to deployed version
        id: compare
        run: |
          TAG="${{ github.event.release.tag_name }}"
          DEPLOYED="${{ vars.DEPLOYED_VERSION }}"
          if [ -n "$DEPLOYED" ] && [ "$TAG" = "$DEPLOYED" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already deployed — skipping"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deploying release ${TAG}"
          fi

  push-ghcr-image:
    name: Production · 2 · Push self-host image (GHCR)
    runs-on: ubuntu-latest
    environment: production
    needs: [check-not-deployed]
    if: needs.check-not-deployed.outputs.should_deploy == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push combined image
        env:
          DOCKER_BUILDKIT: "1"
        run: >
          bash .github/scripts/build-push-ghcr.sh
          ghcr.io/${{ github.repository }}
          ${{ github.event.release.tag_name }}

  migrate-production:
    name: Production · 3 · Run DB migrations
    runs-on: ubuntu-latest
    environment: production
    needs: [check-not-deployed]
    if: needs.check-not-deployed.outputs.should_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: oidc
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: slugbase-cloud
          env-slug: prod

      - name: Run Drizzle migrations
        run: pnpm --filter @slugbase/backend exec drizzle-kit migrate

  deploy-fly-production:
    name: Production · 4 · Deploy API (Fly)
    runs-on: ubuntu-latest
    environment: production
    needs: [check-not-deployed, migrate-production]
    if: needs.check-not-deployed.outputs.should_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: oidc
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: slugbase-cloud
          env-slug: prod

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"
          infisical-env-slug: prod
          infisical-domain: ${{ secrets.INFISICAL_DOMAIN }}
          infisical-identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}

      - name: Derive release version
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "release=slugbase@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build API and shared packages
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@slugbase/backend...

      - name: Upload backend source maps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ env.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ env.SENTRY_PROJECT }}
        run: |
          npm install -g @sentry/cli
          sentry-cli sourcemaps upload \
            --release "${{ steps.release.outputs.release }}" \
            packages/backend/dist
          MAP_COUNT=$(find packages/backend/dist -name '*.js.map' | wc -l)
          echo "Uploaded ${MAP_COUNT} backend source maps for release ${{ steps.release.outputs.release }} (production)"

      - name: Setup flyctl
        run: bash .github/scripts/setup-flyctl.sh

      - name: Deploy to Fly.io
        env:
          DOCKER_BUILDKIT: "1"
        run: bash .github/scripts/fly-deploy.sh slugbase-production-api

  deploy-web-production:
    name: Production · 4 · Deploy web (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: production
    needs: [check-not-deployed]
    if: needs.check-not-deployed.outputs.should_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"
          infisical-env-slug: prod
          infisical-domain: ${{ secrets.INFISICAL_DOMAIN }}
          infisical-identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}

      - name: Derive release version
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "release=slugbase@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build shared dependencies for web
        env:
          NODE_ENV: production
        run: pnpm --filter @slugbase/web^... build

      - name: Build web client
        env:
          NODE_ENV: production
          SENTRY_PROJECT: slugbase-web
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: ${{ steps.release.outputs.release }}
        run: pnpm --filter @slugbase/web build

      - name: Strip source maps from web build output
        run: |
          find packages/web/build -name '*.js.map' -delete
          echo "Stripped .map files from web build (safety cleanup)"

      - name: Swizzle wrangler config for production
        run: |
          sed \
            -e 's/slugbase-staging-web/slugbase-production-web/g' \
            -e 's/staging-cloud\.slugbase\.app/cloud.slugbase.app/g' \
            packages/web/build/server/wrangler.json \
            > packages/web/build/server/wrangler.deploy.json

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: bash .github/scripts/wrangler-deploy-web-retry.sh packages/web build/server/wrangler.deploy.json

  deploy-marketing-production:
    name: Production · 4 · Deploy marketing (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: production
    needs: [check-not-deployed]
    if: needs.check-not-deployed.outputs.should_deploy == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"
          infisical-env-slug: prod
          infisical-domain: ${{ secrets.INFISICAL_DOMAIN }}
          infisical-identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}

      - name: Build shared dependencies for marketing
        env:
          NODE_ENV: production
        run: pnpm --filter @slugbase/marketing^... build

      - name: Build marketing site
        env:
          NODE_ENV: production
        run: pnpm --filter @slugbase/marketing build

      - name: Swizzle wrangler config for production
        run: |
          sed \
            -e 's/slugbase-staging-marketing/slugbase-production-marketing/g' \
            -e 's/staging\.slugbase\.app/slugbase.app/g' \
            packages/marketing/wrangler.jsonc \
            > packages/marketing/wrangler.production.jsonc

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: bash .github/scripts/wrangler-deploy-retry.sh packages/marketing --config wrangler.production.jsonc

  smoke-production:
    name: Production · 5 · Smoke
    runs-on: ubuntu-latest
    environment: production
    needs:
      [
        check-not-deployed,
        deploy-fly-production,
        deploy-web-production,
        deploy-marketing-production,
      ]
    if: needs.check-not-deployed.outputs.should_deploy == 'true'
    env:
      # Public URLs from GitHub vars (not redacted)
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
      MARKETING_ORIGIN: ${{ vars.MARKETING_ORIGIN }}
      # Cloudflare Access credentials (if production uses Access)
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Smoke health endpoints
        run: bash .github/scripts/smoke-staging-health.sh

  record-deployed-version:
    name: Production · 6 · Record deployed version
    runs-on: ubuntu-latest
    environment: production
    needs:
      [
        check-not-deployed,
        deploy-fly-production,
        deploy-web-production,
        deploy-marketing-production,
        push-ghcr-image,
        smoke-production,
      ]
    if: >-
      needs.check-not-deployed.outputs.should_deploy == 'true'
      && needs.deploy-fly-production.result == 'success'
      && needs.deploy-web-production.result == 'success'
      && needs.deploy-marketing-production.result == 'success'
      && needs.push-ghcr-image.result == 'success'
      && needs.smoke-production.result == 'success'
    permissions:
      actions: write
    steps:
      - name: Update DEPLOYED_VERSION
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh variable set DEPLOYED_VERSION --body "${{ github.event.release.tag_name }}"
