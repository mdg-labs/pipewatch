name: Deploy Staging

# Staging deploy pipeline — reusable workflow called from ci.yml after CI passes (spec §22.5).
# Job dependency chain: build (parallel API + web/marketing) → migrate → deploy → smoke.
# Deployment records are created automatically by the staging GitHub Environment.

on:
  workflow_call:

permissions:
  contents: read
  id-token: write    # Infisical OIDC
  packages: write    # GHCR push (push-ghcr-staging-dev)

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  push-ghcr-staging-dev:
    name: Staging · 1 · Push self-host image (GHCR dev)
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push combined image (dev tag)
        env:
          DOCKER_BUILDKIT: "1"
        run: >
          bash .github/scripts/build-push-ghcr.sh
          ghcr.io/${{ github.repository }}
          dev
          --no-latest

  migrate-staging:
    name: Staging · 2 · Run DB migrations
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: oidc
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: slugbase-cloud
          env-slug: staging

      - name: Run Drizzle migrations
        run: pnpm --filter @slugbase/backend exec drizzle-kit migrate

  deploy-fly-staging:
    name: Staging · 3 · Deploy API (Fly)
    runs-on: ubuntu-latest
    environment: staging
    needs: migrate-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: oidc
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: slugbase-cloud
          env-slug: staging

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"
          infisical-env-slug: staging
          infisical-domain: ${{ secrets.INFISICAL_DOMAIN }}
          infisical-identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}

      - name: Derive release version
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "release=slugbase@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build API and shared packages
        env:
          NODE_ENV: production
        run: pnpm exec turbo run build --filter=@slugbase/backend...

      - name: Upload backend source maps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ env.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ env.SENTRY_PROJECT }}
        run: |
          npm install -g @sentry/cli
          sentry-cli sourcemaps upload \
            --release "${{ steps.release.outputs.release }}" \
            packages/backend/dist
          echo "Uploaded $(find packages/backend/dist -name '*.js.map' | wc -l) backend source maps for release ${{ steps.release.outputs.release }} (staging)"

      - name: Setup flyctl
        run: bash .github/scripts/setup-flyctl.sh

      - name: Deploy to Fly.io
        env:
          DOCKER_BUILDKIT: "1"
        run: bash .github/scripts/fly-deploy.sh slugbase-staging-api

  deploy-web-staging:
    name: Staging · 3 · Deploy web (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: staging
    needs: [migrate-staging]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"
          infisical-env-slug: staging
          infisical-domain: ${{ secrets.INFISICAL_DOMAIN }}
          infisical-identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}

      - name: Derive release version
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "release=slugbase@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build shared dependencies for web
        env:
          NODE_ENV: production
        run: pnpm --filter @slugbase/web^... build

      - name: Build web client
        env:
          NODE_ENV: production
          SENTRY_PROJECT: slugbase-web
          VITE_SENTRY_ENVIRONMENT: staging
          VITE_SENTRY_RELEASE: ${{ steps.release.outputs.release }}
        run: pnpm --filter @slugbase/web build

      - name: Strip source maps from web build output
        run: |
          find packages/web/build -name '*.js.map' -delete
          echo "Stripped .map files from web build (safety cleanup)"

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: bash .github/scripts/wrangler-deploy-web-retry.sh packages/web

  deploy-marketing-staging:
    name: Staging · 3 · Deploy marketing (Cloudflare Workers)
    runs-on: ubuntu-latest
    environment: staging
    needs: [migrate-staging]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup
        with:
          skip-checkout: "true"
          infisical-env-slug: staging
          infisical-domain: ${{ secrets.INFISICAL_DOMAIN }}
          infisical-identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}

      - name: Build shared dependencies for marketing
        env:
          NODE_ENV: production
        run: pnpm --filter @slugbase/marketing^... build

      - name: Build marketing site
        env:
          NODE_ENV: production
        run: pnpm --filter @slugbase/marketing build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: bash .github/scripts/wrangler-deploy-retry.sh packages/marketing --config wrangler.jsonc

  smoke-staging:
    name: Staging · 4 · Smoke
    runs-on: ubuntu-latest
    environment: staging
    needs: [deploy-fly-staging, deploy-web-staging, deploy-marketing-staging]
    env:
      # Public URLs from GitHub vars (not redacted)
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
      MARKETING_ORIGIN: ${{ vars.MARKETING_ORIGIN }}
      # Cloudflare Access credentials (required to bypass Access on staging workers)
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Smoke deploy surfaces (API/web /health+/version; marketing root)
        run: bash .github/scripts/smoke-staging-health.sh
