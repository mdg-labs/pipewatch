# Fly.io admin portal (Admin PRD §6).
# App name is overridden at deploy time via deploy-fly.sh (per-env app name).
# Secrets are staged by sync-secrets.yml and applied on flyctl deploy.

app = "pipewatch-staging-admin"
primary_region = "fra"

[build]
  dockerfile = "apps/admin/Dockerfile"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
