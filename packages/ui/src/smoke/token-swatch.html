<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PipeWatch Token Swatches</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: var(--space-8);
        font-family: var(--font-sans);
        font-size: var(--text-base);
        line-height: var(--leading-normal);
        color: var(--text-primary);
        background: var(--bg-base);
      }

      h1 {
        font-size: var(--text-2xl);
        font-weight: var(--weight-semibold);
        margin: 0 0 var(--space-6);
      }

      h2 {
        font-size: var(--text-md);
        font-weight: var(--weight-medium);
        margin: var(--space-8) 0 var(--space-4);
        color: var(--text-secondary);
      }

      .toolbar {
        display: flex;
        gap: var(--space-3);
        margin-bottom: var(--space-8);
      }

      button {
        font-family: var(--font-sans);
        font-size: var(--text-sm);
        padding: var(--space-2) var(--space-4);
        border-radius: var(--radius-md);
        border: 1px solid var(--border-default);
        background: var(--bg-surface);
        color: var(--text-primary);
        cursor: pointer;
      }

      button:hover {
        background: var(--bg-elevated);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: var(--space-3);
      }

      .swatch {
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        overflow: hidden;
        background: var(--bg-surface);
      }

      .swatch-color {
        height: 56px;
      }

      .swatch-label {
        padding: var(--space-2) var(--space-3);
        font-size: var(--text-xs);
        font-family: var(--font-mono);
        color: var(--text-secondary);
      }

      .type-sample {
        padding: var(--space-4);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        background: var(--bg-surface);
        margin-bottom: var(--space-3);
      }

      .mono {
        font-family: var(--font-mono);
      }
    </style>
  </head>
  <body>
    <h1>PipeWatch design tokens</h1>
    <div class="toolbar">
      <button type="button" id="theme-dark">Dark (default)</button>
      <button type="button" id="theme-light">Light</button>
    </div>

    <h2>Semantic backgrounds</h2>
    <div class="grid" id="semantic-bg"></div>

    <h2>Status colors</h2>
    <div class="grid" id="status-colors"></div>

    <h2>Brand accent</h2>
    <div class="grid" id="accent-colors"></div>

    <h2>Typography</h2>
    <div class="type-sample" style="font-size: var(--text-5xl)">Display 48px</div>
    <div class="type-sample" style="font-size: var(--text-lg)">Page title 18px</div>
    <div class="type-sample">Body 14px — Hanken Grotesk</div>
    <div class="type-sample mono">Monospace — JetBrains Mono — a4f92c1 main 2m 14s</div>

    <script>
      const semanticBg = [
        ["--bg-base", "bg-base"],
        ["--bg-surface", "bg-surface"],
        ["--bg-elevated", "bg-elevated"],
        ["--bg-overlay", "bg-overlay"],
        ["--bg-code", "bg-code"],
      ];

      const statusColors = [
        ["--status-success", "success"],
        ["--status-failure", "failure"],
        ["--status-running", "running"],
        ["--status-queued", "queued"],
        ["--status-cancelled", "cancelled"],
        ["--status-skipped", "skipped"],
      ];

      const accentColors = [
        ["--pw-amber-300", "amber-300"],
        ["--pw-amber-500", "amber-500"],
        ["--pw-amber-700", "amber-700"],
      ];

      function renderSwatches(containerId, tokens) {
        const container = document.getElementById(containerId);
        for (const [token, label] of tokens) {
          const el = document.createElement("div");
          el.className = "swatch";
          el.innerHTML =
            '<div class="swatch-color" style="background: var(' +
            token +
            ')"></div><div class="swatch-label">' +
            label +
            "</div>";
          container.appendChild(el);
        }
      }

      renderSwatches("semantic-bg", semanticBg);
      renderSwatches("status-colors", statusColors);
      renderSwatches("accent-colors", accentColors);

      document.getElementById("theme-dark").addEventListener("click", () => {
        document.documentElement.removeAttribute("data-theme");
      });
      document.getElementById("theme-light").addEventListener("click", () => {
        document.documentElement.setAttribute("data-theme", "light");
      });
    </script>
  </body>
</html>
